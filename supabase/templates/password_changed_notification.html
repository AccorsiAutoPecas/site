<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Senha alterada</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f0f2f7;font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f0f2f7;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="100%" style="max-width:520px;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(52,69,107,0.12);">
            <tr>
              <td style="background-color:#34456b;padding:24px 28px;">
                <p style="margin:0;font-size:18px;font-weight:700;color:#ffffff;">Accorsi Auto Peças</p>
                <p style="margin:8px 0 0;font-size:14px;color:rgba(255,255,255,0.9);">Notificação de segurança</p>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 16px;font-size:15px;line-height:1.5;color:#34456b;">Olá,</p>
                <p style="margin:0 0 20px;font-size:15px;line-height:1.55;color:#415074;">A senha da conta <strong style="color:#34456b;">{{ .Email }}</strong> foi alterada com sucesso.</p>
                <p style="margin:0;font-size:14px;line-height:1.55;color:#415074;">Se você não realizou esta alteração, redefina a senha imediatamente e entre em contato com o suporte.</p>
              </td>
            </tr>
          </table>
          <p style="margin:24px 0 0;font-size:11px;color:#9ca3af;">Enviado para {{ .Email }}</p>
        </td>
      </tr>
    </table>
  </body>
</html>
